<template>
    <lightning-layout>
        <lightning-layout-item padding="around-small" size="2">
        <lightning-card title="Account Dashboard" icon-name="standard:account">
            <template for:each={accounts.data} for:item="accObj" for:index="index">
                <p key={accObj.Id} class="slds-p-horizontal_small">
                    <a href="#" onclick={handleClick} data-accountid={accObj.Id}>
                        {accObj.Name}
                    </a>
                </p>

            </template>
        </lightning-card>
        </lightning-layout-item>
        <lightning-layout-item padding="around-small" size="10">
            <c-e-r-p-contact-component account-id={accountIdfromParent}></c-e-r-p-contact-component>
        </lightning-layout-item> 
   </lightning-layout>
   <lightning-layout>
           
          <lightning-layout-item padding="around-small" size="10">
                <c-e-r-p-opportunity-component account-id={accountIdfromParentOppo}></c-e-r-p-opportunity-component>
        </lightning-layout-item>
  
   </lightning-layout>
    
 
</template>
